<!DOCTYPE html><html><head><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1117;color:#F0F6FC;font-family:'Inter',sans-serif;width:1080px;height:1920px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.phone{width:680px;background:#161B22;border-radius:44px;border:3px solid #30363D;overflow:hidden;box-shadow:0 0 120px rgba(255,215,0,0.12)}
.pt{height:52px;background:#0D1117;display:flex;align-items:center;justify-content:space-between;padding:0 28px;font-size:22px;font-weight:600;color:#8B949E}
.pb{padding:28px}
.ch{text-align:center;padding:24px 0 28px}
.cl{font-size:15px;color:#8B949E;letter-spacing:5px;font-weight:700}
.ca{font-size:68px;font-weight:900;color:#FFD700;margin:4px 0}
.cr{font-size:24px;color:#3FB950;font-weight:700}
.nb{background:#0D1117;border:2px solid #FFD70030;border-radius:16px;padding:20px;margin-bottom:20px}
.nl{font-size:13px;color:#8B949E;letter-spacing:3px;font-weight:600}
.nv{font-size:36px;font-weight:900;margin:2px 0}
.nt{font-size:18px;font-weight:700;color:#FF6B6B}
.bar{height:6px;background:#21262D;border-radius:3px;margin-top:10px}
.fill{height:100%;width:72%;background:linear-gradient(90deg,#FFD700,#FF6B6B);border-radius:3px}
.bz{display:flex;align-items:center;background:#0D1117;border:1px solid #30363D;border-radius:14px;padding:16px 18px;margin:10px 0}
.bze{font-size:40px;margin-right:16px}
.bzn{font-size:22px;font-weight:700}
.bzi{font-size:16px;color:#3FB950;font-weight:600}
.blv{margin-left:auto;background:#FFD70018;color:#FFD700;padding:6px 16px;border-radius:20px;font-size:16px;font-weight:800}
.bbu{margin-left:8px;background:#FFD700;color:#000;padding:6px 16px;border-radius:20px;font-size:15px;font-weight:800}
</style></head><body>
<div class="phone"><div class="pt"><span>2:25 PM</span><span>⚡📶🔋</span></div><div class="pb">
<div class="ch"><div class="cl">CASH</div><div class="ca">$1.02M</div><div class="cr">↑ $535/s ⚡</div></div>
<div class="nb"><div class="nl">NET WORTH</div><div class="nv">$1.2M</div><div class="nt">🔥 Mid-Range — Tier 3/6</div><div class="bar"><div class="fill"></div></div></div>
<div class="bz"><div class="bze">🌭</div><div><div class="bzn">Hot Dog Stand</div><div class="bzi">$231/s</div></div><div class="blv">Lv14</div></div>
<div class="bz"><div class="bze">🍋</div><div><div class="bzn">Lemonade Cart</div><div class="bzi">$86/s</div></div><div class="blv">Lv8</div></div>
<div class="bz"><div class="bze">🏢</div><div><div class="bzn">Tech Startup</div><div class="bzi">$2.1K/s</div></div><div class="bbu">$4.8K</div></div>
</div></div>
</body></html>
