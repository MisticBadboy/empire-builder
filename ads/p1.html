<!DOCTYPE html><html><head><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1117;color:#F0F6FC;font-family:'Inter',sans-serif;width:1080px;height:1920px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
.title{font-size:96px;font-weight:900;text-align:center;line-height:1.05}
.gold{color:#FFD700;text-shadow:0 0 60px #FFD70060}
.sub{font-size:40px;color:#8B949E;margin-top:30px;font-weight:600}
.money{font-size:130px;margin-top:60px}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,#FFD70015 0%,transparent 70%);border-radius:50%;pointer-events:none}
</style></head><body>
<div class="glow"></div>
<div class="title">BUILD YOUR<br><span class="gold">EMPIRE</span></div>
<div class="sub">From $0 to Tycoon</div>
<div class="money">💰</div>
</body></html>
